name: C++ CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Debug Configuration
      run: msbuild BachelorProject.slnx /p:Configuration=Debug /p:Platform=x64 /p:PlatformToolset=v143

    - name: Build Release Configuration
      run: msbuild BachelorProject.slnx /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143